<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Engg.tv</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary': '#7e5700',
                        'secondary': '#b60055',
                        'accent-pink': '#FF006E',
                        'accent-yellow': '#FDA60A',
                    },
                    fontFamily: {
                        'space': ['Space Grotesk', 'sans-serif'],
                        'lexend': ['Lexend', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Lexend', sans-serif;
            background: linear-gradient(135deg, #fff8f5 0%, #ffe4d6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 25px 50px -12px rgba(126, 87, 0, 0.15);
        }
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0px); }
        }
        .tab-btn.active {
            color: #FDA60A;
            border-bottom: 3px solid #FDA60A;
        }
    </style>
</head>
<body class="p-6">
    <div class="w-full max-w-md">
        <!-- Logo Section -->
        <div class="flex flex-col items-center mb-10 animate-float">
            <div class="w-20 h-20 bg-accent-yellow rounded-3xl flex items-center justify-center shadow-lg mb-4 transform rotate-12">
                <span class="material-symbols-outlined text-white text-4xl" style="font-variation-settings: 'FILL' 1;">engineering</span>
            </div>
            <h1 class="font-space text-4xl font-black tracking-tighter text-accent-navy">Engg.tv</h1>
            <p class="text-slate-500 font-medium mt-1 text-center">Your FE Mechanical Exam Companion</p>
        </div>

        <!-- Auth Card -->
        <div class="login-card p-10 rounded-[32px]">
            <div id="tab-container" class="flex border-b border-slate-100 mb-8">
                <button id="tab-login" class="tab-btn active flex-1 py-4 font-bold text-slate-400 transition-all text-sm uppercase tracking-widest">Sign In</button>
                <button id="tab-register" class="tab-btn flex-1 py-4 font-bold text-slate-400 transition-all text-sm uppercase tracking-widest">Sign Up</button>
            </div>
            
            <h2 id="form-title" class="font-space text-2xl font-bold text-slate-800 mb-6 text-center">Welcome Back</h2>
            
            <!-- Login/Registration Step 1 -->
            <form id="auth-form" class="space-y-5">
                <div id="email-field" class="hidden">
                    <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Email Address</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
                        <input type="email" id="email" 
                            class="w-full pl-12 pr-4 py-4 bg-white border border-slate-100 rounded-2xl focus:ring-2 focus:ring-accent-yellow focus:border-transparent outline-none transition-all placeholder:text-slate-300"
                            placeholder="Enter your email">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Username</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">person</span>
                        <input type="text" id="username" required 
                            class="w-full pl-12 pr-4 py-4 bg-white border border-slate-100 rounded-2xl focus:ring-2 focus:ring-accent-yellow focus:border-transparent outline-none transition-all placeholder:text-slate-300"
                            placeholder="Choose a username">
                    </div>
                </div>

                <div id="password-field">
                    <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Password</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
                        <input type="password" id="password" required 
                            class="w-full pl-12 pr-4 py-4 bg-white border border-slate-100 rounded-2xl focus:ring-2 focus:ring-accent-yellow focus:border-transparent outline-none transition-all placeholder:text-slate-300"
                            placeholder="Choose a password">
                    </div>
                </div>

                <div id="discipline-field" class="hidden">
                    <label class="block text-sm font-bold text-slate-700 mb-2 ml-1">Discipline</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">school</span>
                        <select id="discipline" 
                            class="w-full pl-12 pr-4 py-4 bg-white border border-slate-100 rounded-2xl focus:ring-2 focus:ring-accent-yellow focus:border-transparent outline-none transition-all appearance-none cursor-pointer">
                            <option value="Mechanical">Mechanical</option>
                            <option value="Civil">Civil</option>
                            <option value="FE_Other Discipline">FE_Other Discipline</option>
                        </select>
                        <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
                    </div>
                </div>

                <div id="feedback-message" class="text-sm font-medium hidden text-center py-3 rounded-xl border">
                </div>

                <button type="submit" id="submit-btn" 
                    class="w-full py-4 bg-accent-yellow hover:bg-amber-500 text-white font-bold rounded-2xl shadow-lg shadow-amber-200 active:scale-[0.98] transition-all flex items-center justify-center gap-2 uppercase tracking-widest mt-2">
                    Sign In
                    <span class="material-symbols-outlined">arrow_forward</span>
                </button>
            </form>

            <!-- Registration Step 2 -->
            <form id="reg-step-2" class="space-y-6 hidden">
                <h3 class="text-slate-600 font-bold text-center mb-4">Final Step</h3>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-3 ml-1 text-center">When are you planning to take the exam?</label>
                    <div class="relative">
                        <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">calendar_month</span>
                        <select id="exam-timeline" required
                            class="w-full pl-12 pr-4 py-4 bg-white border border-slate-100 rounded-2xl focus:ring-2 focus:ring-accent-yellow focus:border-transparent outline-none transition-all appearance-none cursor-pointer font-medium">
                            <option value="Within a month">Within a month</option>
                            <option value="Within three months">Within three months</option>
                            <option value="Within six months">Within six months</option>
                            <option value="Within a year">Within a year</option>
                            <option value="Undecided">Undecided</option>
                        </select>
                        <span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none">expand_more</span>
                    </div>
                </div>

                <button type="submit" 
                    class="w-full py-4 bg-accent-pink hover:bg-pink-600 text-white font-bold rounded-2xl shadow-lg shadow-pink-200 active:scale-[0.98] transition-all flex items-center justify-center gap-2 uppercase tracking-widest">
                    Complete Registration
                    <span class="material-symbols-outlined">check_circle</span>
                </button>
                
                <button type="button" id="back-to-step-1" class="w-full text-slate-400 text-sm font-bold hover:text-slate-600 transition-colors uppercase tracking-widest">
                    Back
                </button>
            </form>

            <div class="mt-8 text-center" id="form-footer">
                <p class="text-slate-400 text-sm">Don't have an account? <button id="switch-to-reg" class="text-accent-pink font-bold hover:underline">Register Now</button></p>
            </div>
        </div>

        <p class="text-center text-slate-400 text-[12px] mt-12 font-medium tracking-widest uppercase">Version 2.4.0 (BETA)</p>
    </div>

    <script>
        let mode = 'login'; // or 'register'
        const authForm = document.getElementById('auth-form');
        const regStep2 = document.getElementById('reg-step-2');
        const feedbackMsg = document.getElementById('feedback-message');
        const tabLogin = document.getElementById('tab-login');
        const tabRegister = document.getElementById('tab-register');
        const formTitle = document.getElementById('form-title');
        const submitBtn = document.getElementById('submit-btn');
        const footerLink = document.getElementById('switch-to-reg');
        const emailField = document.getElementById('email-field');
        const disciplineField = document.getElementById('discipline-field');
        const tabContainer = document.getElementById('tab-container');
        const backToStep1 = document.getElementById('back-to-step-1');

        let pendingUserData = null;

        function setMode(newMode) {
            mode = newMode;
            authForm.classList.remove('hidden');
            regStep2.classList.add('hidden');
            tabContainer.classList.remove('hidden');

            if (mode === 'login') {
                tabLogin.classList.add('active');
                tabRegister.classList.remove('active');
                formTitle.textContent = 'Welcome Back';
                submitBtn.innerHTML = 'Sign In <span class="material-symbols-outlined">arrow_forward</span>';
                emailField.classList.add('hidden');
                disciplineField.classList.add('hidden');
                footerLink.parentElement.classList.remove('hidden');
            } else {
                tabLogin.classList.remove('active');
                tabRegister.classList.add('active');
                formTitle.textContent = 'Create Account';
                submitBtn.innerHTML = 'Next Step <span class="material-symbols-outlined">arrow_forward</span>';
                emailField.classList.remove('hidden');
                disciplineField.classList.remove('hidden');
                footerLink.parentElement.classList.add('hidden');
            }
        }

        tabLogin.addEventListener('click', () => setMode('login'));
        tabRegister.addEventListener('click', () => setMode('register'));
        footerLink.addEventListener('click', () => setMode('register'));
        backToStep1.addEventListener('click', () => {
            regStep2.classList.add('hidden');
            authForm.classList.remove('hidden');
            tabContainer.classList.remove('hidden');
        });

        authForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const email = document.getElementById('email').value;
            const discipline = document.getElementById('discipline').value;
            const users = JSON.parse(localStorage.getItem('enggtv_users') || '{}');

            if (mode === 'login') {
                if (user === 'demo' && pass === 'habit-tracker') {
                    loginSuccess({ username: 'demo', email: 'demo@engg.tv', tier: 'premium', discipline: 'Mechanical' });
                    return;
                }
                if (users[user] && users[user].password === pass) {
                    loginSuccess(users[user]);
                } else {
                    showError('Invalid username or password');
                }
            } else {
                // Register Step 1
                if (user === 'demo') {
                    showError('Username reserved');
                    return;
                }
                if (users[user]) {
                    showError('Username already exists');
                    return;
                }

                pendingUserData = { 
                    username: user, 
                    email: email, 
                    password: pass, 
                    tier: 'free',
                    discipline: discipline 
                };
                
                // Show Step 2
                authForm.classList.add('hidden');
                tabContainer.classList.add('hidden');
                regStep2.classList.remove('hidden');
            }
        });

        regStep2.addEventListener('submit', (e) => {
            e.preventDefault();
            const timeline = document.getElementById('exam-timeline').value;
            const users = JSON.parse(localStorage.getItem('enggtv_users') || '{}');
            
            const fullUserData = { ...pendingUserData, examTimeline: timeline };
            users[fullUserData.username] = fullUserData;
            localStorage.setItem('enggtv_users', JSON.stringify(users));
            
            showSuccess('Account created! Please sign in.');
            setTimeout(() => {
                setMode('login');
                regStep2.classList.add('hidden');
                authForm.classList.remove('hidden');
            }, 1500);
        });

        function loginSuccess(userData) {
            localStorage.setItem('enggtv_authenticated', 'true');
            localStorage.setItem('enggtv_user', JSON.stringify(userData));
            localStorage.setItem('enggtv_discipline', userData.discipline);
            window.location.href = 'index.html';
        }

        function showError(msg) {
            feedbackMsg.textContent = msg;
            feedbackMsg.className = 'text-red-500 text-sm font-medium text-center bg-red-50 py-3 rounded-xl border border-red-100 block';
            feedbackMsg.classList.remove('hidden');
            setTimeout(() => feedbackMsg.classList.add('hidden'), 3000);
        }

        function showSuccess(msg) {
            feedbackMsg.textContent = msg;
            feedbackMsg.className = 'text-green-600 text-sm font-medium text-center bg-green-50 py-3 rounded-xl border border-green-100 block';
            feedbackMsg.classList.remove('hidden');
            setTimeout(() => feedbackMsg.classList.add('hidden'), 3000);
        }

        if (localStorage.getItem('enggtv_authenticated') === 'true') {
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
